<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clase 3 · Condicionales, ciclos y funciones — Dev Senior</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --indigo:#5418CC;
  --violet:#6018F0;
  --dark:#3C1884;
  --lilac:#B69BF5;
  --lilac-soft:#D9CCFA;
  --bg:#0B0713;
  --bg-2:#120A22;
  --card:#180F2B;
  --card-2:#1F1437;
  --border:#2C1F49;
  --border-bright:#3D2A66;
  --text:#EDE7FB;
  --text-dim:#A99FC4;
  --text-faint:#6E6390;
  --ok:#34D399;
  --warn:#FBBF24;
  --danger:#F87171;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ---------- constellation bg ---------- */
#constellation{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}

/* ---------- progress top bar ---------- */
#progress-top{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--violet),var(--lilac));z-index:200;transition:width .25s ease;box-shadow:0 0 12px var(--violet)}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh;position:relative;z-index:1}

/* ---------- sidebar ---------- */
.sidebar{
  width:300px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(24,15,43,.94),rgba(11,7,19,.94));
  border-right:1px solid var(--border);
  backdrop-filter:blur(12px);
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;
  padding:26px 18px;
  z-index:50;
}
.brand{display:flex;align-items:center;gap:11px;padding:0 8px 20px;border-bottom:1px solid var(--border);margin-bottom:18px}
.brand-logo{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--violet),var(--dark));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:20px;color:#fff;
  box-shadow:0 4px 16px rgba(96,24,240,.4);
}
.brand-txt h1{font-size:13px;font-weight:800;letter-spacing:.3px;line-height:1.25}
.brand-txt span{font-size:11px;color:var(--lilac);font-weight:600}

.progress-wrap{padding:0 8px 16px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-faint);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.progress-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--violet),var(--lilac));border-radius:99px;transition:width .4s cubic-bezier(.2,.8,.2,1)}

.nav{flex:1;overflow-y:auto;margin:0 -6px;padding:0 6px}
.nav::-webkit-scrollbar{width:5px}
.nav::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:9px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:11px;cursor:pointer;
  color:var(--text-dim);font-size:13.5px;font-weight:500;
  transition:all .16s ease;margin-bottom:3px;position:relative;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--card-2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(96,24,240,.22),rgba(96,24,240,.08));color:#fff;border-color:var(--border-bright)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:linear-gradient(var(--violet),var(--lilac));border-radius:9px}
.nav-ico{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:8px;background:var(--card-2);transition:all .16s}
.nav-item.active .nav-ico{background:var(--violet);box-shadow:0 2px 10px rgba(96,24,240,.5)}
.nav-num{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--text-faint);font-weight:700}
.nav-check{margin-left:auto;color:var(--ok);font-size:13px;display:none}
.nav-item.seen .nav-check{display:block}
.nav-item.seen .nav-num{display:none}

.sidebar-foot{padding:14px 8px 0;border-top:1px solid var(--border);margin-top:10px}
.present-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px;border-radius:11px;border:1px solid var(--border-bright);
  background:linear-gradient(135deg,var(--indigo),var(--dark));
  color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;
  transition:all .18s;
}
.present-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(84,24,204,.5)}
.kbd-hint{text-align:center;font-size:10.5px;color:var(--text-faint);margin-top:9px}
.kbd{font-family:var(--mono);background:var(--card-2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:10px;color:var(--lilac)}

/* ---------- main ---------- */
.main{flex:1;min-width:0;position:relative}
.content{max-width:880px;margin:0 auto;padding:54px 44px 90px}

.section{display:none;animation:fade .45s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--lilac);margin-bottom:14px;padding:5px 13px;background:rgba(96,24,240,.12);border:1px solid var(--border-bright);border-radius:99px}
h2.section-title{font-size:38px;font-weight:900;line-height:1.12;letter-spacing:-1px;margin-bottom:10px}
h2.section-title .accent{background:linear-gradient(120deg,var(--lilac),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.section-lead{font-size:17px;color:var(--text-dim);margin-bottom:32px;max-width:680px}

h3{font-size:21px;font-weight:800;margin:34px 0 13px;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
h3 .h3-bar{width:4px;height:20px;background:linear-gradient(var(--violet),var(--lilac));border-radius:9px;flex-shrink:0}
p{margin-bottom:14px;color:var(--text)}
p.dim{color:var(--text-dim)}
strong{color:#fff;font-weight:700}
em{color:var(--lilac);font-style:italic}

/* def cards */
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0}
@media(max-width:680px){.def-grid{grid-template-columns:1fr}}
.def-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:20px}
.def-card .def-tag{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;display:inline-flex;align-items:center;gap:6px}
.def-card.tech .def-tag{color:var(--lilac)}
.def-card.life .def-tag{color:var(--warn)}
.def-card p{font-size:14.5px;margin:0;color:var(--text-dim)}
.def-card p em{color:var(--text);font-style:italic}

/* code block */
.code-wrap{position:relative;margin:18px 0}
.code-head{display:flex;align-items:center;justify-content:space-between;background:var(--card-2);border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;padding:9px 15px}
.code-file{font-family:var(--mono);font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.code-dot{width:9px;height:9px;border-radius:50%;background:var(--violet)}
.copy-btn{background:transparent;border:1px solid var(--border-bright);color:var(--text-dim);font-family:var(--sans);font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.copy-btn:hover{background:var(--violet);color:#fff;border-color:var(--violet)}
.copy-btn.done{background:var(--ok);color:#06281c;border-color:var(--ok)}
pre{background:#0C0818;border:1px solid var(--border);border-radius:0 0 12px 12px;padding:17px 18px;overflow-x:auto;font-family:var(--mono);font-size:13.5px;line-height:1.7}
pre::-webkit-scrollbar{height:7px}
pre::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:9px}
code{font-family:var(--mono)}
p code,li code{background:var(--card-2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:.86em;color:var(--lilac)}
/* syntax */
.tok-key{color:#C792EA}.tok-str{color:#C3E88D}.tok-num{color:#F78C6C}.tok-com{color:#5E6687;font-style:italic}.tok-fn{color:#82AAFF}.tok-op{color:#89DDFF}.tok-bool{color:#FF9CAC}

/* run line */
.run{display:flex;gap:11px;align-items:flex-start;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);border-radius:11px;padding:13px 16px;margin:14px 0;font-size:14px}
.run .run-ico{color:var(--ok);flex-shrink:0;margin-top:1px}
.run p{margin:0;color:var(--text-dim);font-size:14px}
.run code{background:rgba(52,211,153,.12);color:#9af5cf;border-color:transparent}

/* tip banner */
.tip{display:flex;gap:13px;background:linear-gradient(135deg,rgba(96,24,240,.14),rgba(96,24,240,.04));border:1px solid var(--border-bright);border-left:3px solid var(--violet);border-radius:12px;padding:16px 18px;margin:20px 0}
.tip .tip-ico{font-size:20px;flex-shrink:0}
.tip p{margin:0;font-size:14.5px;color:var(--text)}
.tip.gold{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.03));border-left-color:var(--warn);border-color:rgba(251,191,36,.3)}

/* socratic reveal */
.socratic{background:var(--card);border:1px solid var(--border-bright);border-radius:15px;padding:22px;margin:22px 0;position:relative;overflow:hidden}
.socratic::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--violet),var(--lilac))}
.soc-q{display:flex;gap:11px;align-items:flex-start;margin-bottom:16px}
.soc-q .soc-ico{font-size:19px;flex-shrink:0}
.soc-q p{margin:0;font-size:16px;font-weight:600;color:#fff}
.soc-reveal-btn{display:inline-flex;align-items:center;gap:8px;background:var(--card-2);border:1px solid var(--border-bright);color:var(--lilac);font-family:var(--sans);font-size:13px;font-weight:700;padding:9px 16px;border-radius:9px;cursor:pointer;transition:all .18s}
.soc-reveal-btn:hover{background:var(--violet);color:#fff;border-color:var(--violet)}
.soc-answer{max-height:0;overflow:hidden;transition:max-height .4s ease,margin .3s,opacity .3s;opacity:0}
.soc-answer.open{max-height:600px;opacity:1;margin-top:16px}
.soc-answer-inner{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);border-radius:11px;padding:15px 17px}
.soc-answer-inner .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--ok);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.soc-answer-inner p{margin:0;font-size:14.5px;color:var(--text)}

/* flow diagram (signature) */
.flow{margin:24px 0;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:16px}
.flow svg{width:100%;height:auto;display:block}
.flow-cap{text-align:center;font-size:12.5px;color:var(--text-faint);padding:6px 0 10px;font-family:var(--mono)}

/* falsy chips */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
.chip{font-family:var(--mono);font-size:13px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);color:#fca5a5;padding:8px 15px;border-radius:9px;font-weight:600}
.chip.t{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.35);color:#86efac}

/* compare good/bad */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
@media(max-width:680px){.cmp{grid-template-columns:1fr}}
.cmp-col .cmp-head{font-size:12.5px;font-weight:800;padding:8px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:7px}
.cmp-col.bad .cmp-head{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.3);border-bottom:none}
.cmp-col.good .cmp-head{background:rgba(52,211,153,.12);color:#86efac;border:1px solid rgba(52,211,153,.3);border-bottom:none}
.cmp-col pre{border-radius:0 0 11px 11px;margin:0;font-size:12.5px}
.cmp-col.bad pre{border-color:rgba(248,113,113,.3)}
.cmp-col.good pre{border-color:rgba(52,211,153,.3)}

/* error type cards */
.err-card{border-radius:14px;padding:2px;margin:16px 0}
.err-card.syntax{background:linear-gradient(135deg,rgba(251,191,36,.4),transparent)}
.err-card.logic{background:linear-gradient(135deg,rgba(248,113,113,.5),transparent)}
.err-inner{background:var(--card);border-radius:12px;padding:18px 20px}
.err-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:5px 12px;border-radius:8px;margin-bottom:12px}
.err-card.syntax .err-badge{background:rgba(251,191,36,.15);color:var(--warn)}
.err-card.logic .err-badge{background:rgba(248,113,113,.15);color:var(--danger)}

/* footer / closing */
.closing{background:linear-gradient(135deg,var(--card-2),var(--card));border:1px solid var(--border-bright);border-radius:18px;padding:30px;margin:26px 0}
.bridge{background:linear-gradient(135deg,rgba(96,24,240,.16),rgba(96,24,240,.04));border:1px solid var(--border-bright);border-radius:16px;padding:24px;margin:20px 0;text-align:center}
.bridge .b-ico{font-size:30px;margin-bottom:10px}
.bridge h4{font-size:19px;font-weight:800;margin-bottom:10px}
.bridge p{color:var(--text-dim);font-size:15px;max-width:560px;margin:0 auto 8px}

/* recap grid */
.recap{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:20px 0}
@media(max-width:680px){.recap{grid-template-columns:1fr}}
.recap-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.recap-card .r-ico{font-size:26px;margin-bottom:9px}
.recap-card h5{font-size:15px;font-weight:800;margin-bottom:5px}
.recap-card p{font-size:12.5px;color:var(--text-faint);margin:0}

footer{border-top:1px solid var(--border);padding:24px 44px;text-align:center;font-size:12px;color:var(--text-faint);position:relative;z-index:1}
footer a{color:var(--lilac);text-decoration:none}
footer a:hover{text-decoration:underline}

/* section foot nav */
.sec-nav{display:flex;justify-content:space-between;gap:14px;margin-top:46px;padding-top:24px;border-top:1px solid var(--border)}
.sec-nav button{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 18px;cursor:pointer;text-align:left;transition:all .18s;color:var(--text);font-family:var(--sans)}
.sec-nav button:hover:not(:disabled){background:var(--card-2);border-color:var(--border-bright);transform:translateY(-1px)}
.sec-nav button:disabled{opacity:.3;cursor:default}
.sec-nav button.next{text-align:right}
.sec-nav .sn-lbl{font-size:11px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sec-nav .sn-title{font-size:14.5px;font-weight:700;color:#fff;margin-top:3px}

/* mobile */
.menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:120;background:var(--violet);border:none;width:44px;height:44px;border-radius:12px;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(84,24,204,.5)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;backdrop-filter:blur(2px)}
@media(max-width:920px){
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .3s ease;width:290px}
  .sidebar.open{transform:none}
  .overlay.show{display:block}
  .content{padding:74px 22px 70px}
  h2.section-title{font-size:30px}
}

/* presentation mode */
body.present .sidebar,body.present .menu-toggle,body.present #progress-top{display:none}
body.present .content{max-width:1100px;padding:60px 70px;display:flex;flex-direction:column;justify-content:center;min-height:100vh}
body.present .sec-nav{display:none}
body.present .main{display:flex;align-items:center}
body.present h2.section-title{font-size:46px}
body.present .section-lead{font-size:20px}
body.present footer{display:none}
.present-hud{display:none}
body.present .present-hud{display:flex;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);gap:14px;align-items:center;background:rgba(24,15,43,.92);border:1px solid var(--border-bright);border-radius:99px;padding:9px 18px;z-index:150;backdrop-filter:blur(10px)}
.present-hud .ph-dot{display:flex;gap:6px}
.present-hud .d{width:7px;height:7px;border-radius:50%;background:var(--border-bright);transition:all .2s}
.present-hud .d.on{background:var(--lilac);width:20px;border-radius:9px}
.present-hud .ph-txt{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
.present-hud .ph-exit{background:var(--card-2);border:1px solid var(--border-bright);color:var(--text-dim);font-size:11px;padding:4px 11px;border-radius:8px;cursor:pointer;font-family:var(--sans);font-weight:600}
.present-hud .ph-exit:hover{color:#fff;background:var(--violet)}
</style>
</head>
<body>
<div id="progress-top"></div>
<canvas id="constellation"></canvas>
<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">d/</div>
      <div class="brand-txt">
        <h1>JavaScript AI Backend</h1>
        <span>Clase 3 · Módulo 1</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>Tu avance</span><span id="pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <button class="present-btn" onclick="enterPresent()">▶ Modo presentación</button>
      <div class="kbd-hint">Navega con <span class="kbd">←</span> <span class="kbd">→</span> · sal con <span class="kbd">Esc</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="content" id="content"></div>
    <footer>
      © 2026 Ana Alvarado · Educadora Tech &amp; Desarrolladora Full Stack · <a href="https://linkedin.com/in/ana-alvarado-instructora-full-stack" target="_blank">linkedin.com/in/ana-alvarado-instructora-full-stack</a>
    </footer>
  </main>
</div>

<div class="present-hud">
  <button class="ph-exit" onclick="exitPresent()">Esc · salir</button>
  <div class="ph-dot" id="hudDots"></div>
  <span class="ph-txt" id="hudTxt">1 / 9</span>
</div>

<script>
/* ============ CONTENT DATA ============ */
const sections = [
  {
    id:'intro', icon:'🚀', nav:'Lo que ya sabes',
    eyebrow:'Repaso vivo',
    title:['Antes de avanzar, ','mira cuánto sabes'],
    lead:'No te voy a contar lo que aprendiste en las clases anteriores. Lo vas a comprobar tú mismo. Tienes un entorno montado, sabes guardar datos y hasta detectaste un error silencioso.',
    body:`
      <h3><span class="h3-bar"></span>De dónde venimos</h3>
      <p class="dim">En la Clase 1 montaste tu entorno: instalaste Node, que te deja correr JavaScript <strong>fuera del navegador</strong>, en tu propia máquina. Por eso puedes ejecutar <code>node archivo.js</code> en la terminal.</p>
      <p class="dim">En la Clase 2 conociste las variables, los tipos de datos y un misterio: el del <strong>510</strong>.</p>

      <div class="tip gold">
        <span class="tip-ico">🕵️</span>
        <p>Un precio llegó como texto <code>"5"</code> y al sumarle <code>10</code> el resultado fue <code>"510"</code>, no <code>15</code>. JavaScript no se equivocó: hizo <strong>coerción</strong>. Como uno era texto, convirtió el otro a texto y los <strong>pegó</strong> en vez de sumarlos.</p>
      </div>

      <div class="code-wrap" data-code="console.log(&quot;5&quot; + 10);   // → &quot;510&quot;  (concatena)
console.log(5 + 10);     // → 15     (suma de verdad)">
        <div class="code-head"><span class="code-file"><span class="code-dot"></span>repaso.js</span></div>
      </div>

      <p class="dim">Y conociste a <strong>TypeScript</strong>: le haces una promesa con <code>: number</code> y, si la rompes, te subraya en rojo <em>antes</em> de ejecutar. El criterio sigue siendo tuyo; TypeScript solo te avisa a tiempo.</p>

      <div class="tip">
        <span class="tip-ico">🎯</span>
        <p>Hoy das el salto más importante hasta ahora: que el programa <strong>tome decisiones por sí solo</strong>.</p>
      </div>

/* ============ syntax highlighter (char tokenizer, safe) ============ */
function highlight(src){
  const kw=new Set(['const','let','var','function','if','else','for','of','in','return','while','switch','case','break','default']);
  const bools=new Set(['true','false','null','undefined','NaN']);
  let out='',i=0;const n=src.length;
  const esc=c=>c==='&'?'&amp;':c==='<'?'&lt;':c==='>'?'&gt;':c;
  while(i<n){
    const c=src[i];
    // line comment
    if(c==='/'&&src[i+1]==='/'){let j=i;while(j<n&&src[j]!=='\n')j++;out+='<span class="tok-com">'+[...src.slice(i,j)].map(esc).join('')+'</span>';i=j;continue;}
    // string
    if(c==='"'||c==="'"){const q=c;let j=i+1;while(j<n&&src[j]!==q){if(src[j]==='\\')j++;j++;}j++;out+='<span class="tok-str">'+[...src.slice(i,Math.min(j,n))].map(esc).join('')+'</span>';i=Math.min(j,n);continue;}
    // number
    if(/[0-9]/.test(c)&&!/[A-Za-z_]/.test(src[i-1]||'')){let j=i;while(j<n&&/[0-9.]/.test(src[j]))j++;out+='<span class="tok-num">'+src.slice(i,j)+'</span>';i=j;continue;}
    // word
    if(/[A-Za-z_$]/.test(c)){let j=i;while(j<n&&/[A-Za-z0-9_$]/.test(src[j]))j++;const word=src.slice(i,j);
      let k=j;while(k<n&&src[k]===' ')k++;
      if(kw.has(word))out+='<span class="tok-key">'+word+'</span>';
      else if(bools.has(word))out+='<span class="tok-bool">'+word+'</span>';
      else if(src[k]==='(')out+='<span class="tok-fn">'+word+'</span>';
      else out+=esc2(word);
      i=j;continue;}
    // operators
    if('+-*/<>=!&|'.includes(c)){out+='<span class="tok-op">'+esc(c)+'</span>';i++;continue;}
    out+=esc(c);i++;
  }
  return out;
}
function esc2(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ============ navigation ============ */
function goTo(i){
  if(i<0||i>=sections.length)return;
  document.querySelectorAll('.section')[current].classList.remove('active');
  document.querySelectorAll('.nav-item')[current].classList.remove('active');
  current=i;
  const sec=document.querySelectorAll('.section')[i];
  const item=document.querySelectorAll('.nav-item')[i];
  sec.classList.add('active');item.classList.add('active');
  seen.add(i);item.classList.add('seen');
  updateProgress();
  if(!document.body.classList.contains('present')){
    document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
    window.scrollTo({top:0,behavior:'smooth'});
  }
  if(window.innerWidth<=920)closeMenu();
  updateHud();
}
function updateProgress(){
  const p=Math.round((seen.size/sections.length)*100);
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('progress-top').style.width=((current+1)/sections.length*100)+'%';
}
updateProgress();

/* ============ presentation mode ============ */
function enterPresent(){
  document.body.classList.add('present');
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});
  buildHud();updateHud();
}
function exitPresent(){
  document.body.classList.remove('present');
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
}
function buildHud(){
  const d=document.getElementById('hudDots');d.innerHTML='';
  sections.forEach((_,i)=>{const x=document.createElement('span');x.className='d'+(i===current?' on':'');d.appendChild(x);});
}
function updateHud(){
  document.getElementById('hudTxt').textContent=(current+1)+' / '+sections.length;
  const dots=document.querySelectorAll('#hudDots .d');
  dots.forEach((x,i)=>x.classList.toggle('on',i===current));
}

/* ============ keyboard ============ */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'){goTo(current+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){goTo(current-1);}
  else if(e.key==='Escape'&&document.body.classList.contains('present')){exitPresent();}
  else if((e.key==='p'||e.key==='P')&&!document.body.classList.contains('present')&&!/input|textarea/i.test(document.activeElement.tagName)){enterPresent();}
});
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement)document.body.classList.remove('present');});

/* ============ mobile menu ============ */
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeMenu(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

/* ============ constellation ============ */
const cv=document.getElementById('constellation'),cx=cv.getContext('2d');
let W,H,pts;
function initC(){W=cv.width=innerWidth;H=cv.height=innerHeight;pts=Array.from({length:Math.min(70,Math.floor(W/22))},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28}));}
function drawC(){
  cx.clearRect(0,0,W,H);
  for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.hypot(dx,dy);
      if(d<130){cx.strokeStyle=`rgba(132,90,230,${.16*(1-d/130)})`;cx.lineWidth=1;cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke();}
    }
    cx.fillStyle='rgba(155,120,240,.65)';cx.beginPath();cx.arc(pts[i].x,pts[i].y,1.5,0,7);cx.fill();
  }
  requestAnimationFrame(drawC);
}
initC();drawC();
addEventListener('resize',initC);
