<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Ana Alvarado">

<title>Clase 4 · CLI Gestor de Tareas · JavaScript AI Backend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --dev-principal:#5418CC;
  --dev-vibrante:#6018F0;
  --dev-oscuro:#3C1884;
  --acento-claro:#9F7AEA;
  --bg-0:#0D0A18;
  --bg-1:#141026;
  --bg-2:#1C1636;
  --bg-3:#241B44;
  --borde:#2E2450;
  --borde-fuerte:#3D2F68;
  --texto:#EDE9F7;
  --texto-2:#B4A9D4;
  --texto-3:#7E739E;
  --verde:#2DD4A7;
  --verde-bg:#0F2E28;
  --ambar:#F0A94A;
  --ambar-bg:#33260F;
  --radio:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg-0);
  color:var(--texto);
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  user-select:none;
  overflow-x:hidden;
}
code,pre,.mono{font-family:'JetBrains Mono',monospace}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:290px;flex-shrink:0;
  background:var(--bg-1);
  border-right:1px solid var(--borde);
  padding:26px 18px;
  position:fixed;top:0;left:0;height:100vh;
  overflow-y:auto;z-index:50;
  transition:transform .3s ease;
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px;padding:0 8px}
.brand-logo{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--dev-vibrante),var(--dev-oscuro));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:20px;color:#fff;
  box-shadow:0 4px 18px rgba(96,24,240,.4);
}
.brand-txt strong{display:block;font-size:15px;font-weight:700;letter-spacing:.3px}
.brand-txt span{display:block;font-size:11px;color:var(--texto-3);letter-spacing:.5px;text-transform:uppercase}
.sidebar-eyebrow{
  font-size:10.5px;letter-spacing:2px;text-transform:uppercase;
  color:var(--texto-3);margin:26px 10px 12px;font-weight:600;
}
.nav a{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  color:var(--texto-2);text-decoration:none;font-size:13.5px;font-weight:500;
  margin-bottom:3px;transition:all .18s;border:1px solid transparent;
  cursor:pointer;
}
.nav a .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav a:hover{background:var(--bg-2);color:var(--texto)}
.nav a.active{
  background:linear-gradient(135deg,rgba(96,24,240,.22),rgba(60,24,132,.12));
  color:#fff;border-color:var(--borde-fuerte);
}
.nav a.active .ic{color:var(--acento-claro)}
.nav .done::after{content:"✓";margin-left:auto;color:var(--verde);font-size:12px;font-weight:700}

/* ===== MAIN ===== */
.main{flex:1;margin-left:290px;min-width:0}
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(13,10,24,.82);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--borde);
  padding:14px 40px;display:flex;align-items:center;gap:18px;
}
.progress-wrap{flex:1;max-width:320px}
.progress-label{font-size:11px;color:var(--texto-3);margin-bottom:5px;letter-spacing:.4px}
.progress-track{height:6px;background:var(--bg-2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--dev-vibrante),var(--acento-claro));border-radius:99px;transition:width .4s ease}
.btn-present{
  margin-left:auto;background:linear-gradient(135deg,var(--dev-vibrante),var(--dev-principal));
  color:#fff;border:none;padding:9px 18px;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:transform .15s,box-shadow .2s;
  box-shadow:0 3px 14px rgba(96,24,240,.35);
}
.btn-present:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(96,24,240,.5)}
.menu-toggle{display:none;background:var(--bg-2);border:1px solid var(--borde);color:var(--texto);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer}

.content{padding:44px 40px 90px;max-width:940px}

/* ===== HERO ===== */
.hero{
  background:
    radial-gradient(circle at 12% 20%,rgba(96,24,240,.28),transparent 42%),
    radial-gradient(circle at 88% 80%,rgba(60,24,132,.32),transparent 45%),
    var(--bg-1);
  border:1px solid var(--borde);border-radius:22px;
  padding:44px 42px;margin-bottom:34px;position:relative;overflow:hidden;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(96,24,240,.15);border:1px solid var(--borde-fuerte);
  color:var(--acento-claro);font-size:11.5px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 14px;border-radius:99px;margin-bottom:20px;
}
.hero h1{font-size:38px;font-weight:800;line-height:1.15;letter-spacing:-.5px;margin-bottom:14px}
.hero h1 .accent{
  background:linear-gradient(120deg,var(--acento-claro),var(--dev-vibrante));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{color:var(--texto-2);font-size:16px;max-width:620px}
.hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.chip{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--bg-2);border:1px solid var(--borde);
  padding:8px 14px;border-radius:10px;font-size:12.5px;color:var(--texto-2);font-weight:500;
}
.chip b{color:var(--texto)}

/* ===== SECTIONS ===== */
.section{display:none;animation:fade .45s ease}
.section.visible{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.sec-head{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.sec-icon{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--bg-3),var(--bg-2));
  border:1px solid var(--borde-fuerte);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.sec-num{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acento-claro);font-weight:700}
.sec-head h2{font-size:27px;font-weight:800;letter-spacing:-.3px}
.sec-sub{color:var(--texto-2);font-size:15.5px;margin:14px 0 26px;padding-left:2px}

/* ===== CARDS / PROSE ===== */
.card{
  background:var(--bg-1);border:1px solid var(--borde);
  border-radius:var(--radio);padding:24px 26px;margin-bottom:20px;
}
.card h3{font-size:17px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:9px}
.card h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--dev-vibrante);flex-shrink:0}
.card p{color:var(--texto-2);margin-bottom:12px}
.card p:last-child{margin-bottom:0}
.card strong{color:var(--texto);font-weight:600}

.def{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;
}
.def-box{background:var(--bg-2);border:1px solid var(--borde);border-radius:11px;padding:16px 18px}
.def-box .lbl{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.def-box.tec .lbl{color:var(--acento-claro)}
.def-box.real .lbl{color:var(--verde)}
.def-box p{font-size:13.5px;color:var(--texto-2);margin:0}

/* ===== TIP / BANNER ===== */
.banner{
  display:flex;gap:14px;padding:16px 20px;border-radius:12px;margin:18px 0;
  border:1px solid;align-items:flex-start;
}
.banner .b-ic{font-size:20px;flex-shrink:0;line-height:1.4}
.banner p{margin:0;font-size:14px}
.banner.tip{background:rgba(96,24,240,.1);border-color:var(--borde-fuerte)}
.banner.tip .b-ic{color:var(--acento-claro)}
.banner.warn{background:var(--ambar-bg);border-color:#5c451a}
.banner.warn .b-ic{color:var(--ambar)}
.banner.bridge{background:var(--verde-bg);border-color:#1c5245}
.banner.bridge .b-ic{color:var(--verde)}

/* ===== CODE ===== */
.code-wrap{margin:18px 0;border-radius:12px;overflow:hidden;border:1px solid var(--borde)}
.code-head{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-2);padding:9px 14px;border-bottom:1px solid var(--borde);
}
.code-file{
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--texto-2);
  display:flex;align-items:center;gap:7px;
}
.code-file .fdot{width:9px;height:9px;border-radius:50%;background:var(--ambar)}
.code-lang{font-size:10px;color:var(--texto-3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.btn-copy{
  margin-left:auto;background:var(--bg-3);border:1px solid var(--borde-fuerte);
  color:var(--texto-2);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.btn-copy:hover{background:var(--dev-oscuro);color:#fff;border-color:var(--dev-vibrante)}
.btn-copy.ok{background:var(--verde-bg);color:var(--verde);border-color:#1c5245}
pre{
  background:#0A0714;padding:18px 20px;overflow-x:auto;
  user-select:text;-webkit-user-select:text;
}
pre code{font-size:13px;line-height:1.75;color:#D8D0F0;white-space:pre}
.tok-key{color:#C792EA}
.tok-str{color:#7FD9A6}
.tok-com{color:#5E5580;font-style:italic}
.tok-fn{color:#82AAFF}
.tok-num{color:#F78C6C}
.tok-op{color:#89DDFF}

/* ===== TERMINAL ===== */
.term{background:#08060F;border:1px solid var(--borde);border-radius:12px;overflow:hidden;margin:18px 0}
.term-head{background:var(--bg-2);padding:8px 14px;display:flex;gap:6px;align-items:center}
.term-head .tdot{width:11px;height:11px;border-radius:50%}
.term-head .tdot.r{background:#FF5F56}.term-head .tdot.y{background:#FFBD2E}.term-head .tdot.g{background:#27C93F}
.term-head span{margin-left:8px;font-size:11px;color:var(--texto-3);font-family:'JetBrains Mono',monospace}
.term pre{background:transparent;user-select:text}
.term pre code{color:#B4A9D4}
.term .prompt-sym{color:var(--verde)}

/* ===== REFLEXIÓN (colapsable) ===== */
.reflex{
  background:linear-gradient(135deg,rgba(96,24,240,.1),rgba(60,24,132,.06));
  border:1px solid var(--borde-fuerte);border-radius:14px;
  padding:20px 22px;margin:20px 0;
}
.reflex-q{display:flex;gap:12px;align-items:flex-start}
.reflex-q .q-ic{
  font-size:18px;flex-shrink:0;width:32px;height:32px;border-radius:9px;
  background:var(--bg-3);display:flex;align-items:center;justify-content:center;
}
.reflex-q .q-txt{font-size:15.5px;font-weight:600;color:var(--texto);padding-top:3px}
.reflex-toggle{
  margin-top:16px;background:var(--bg-2);border:1px solid var(--borde-fuerte);
  color:var(--acento-claro);font-family:inherit;font-size:13px;font-weight:600;
  padding:9px 16px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  transition:all .15s;
}
.reflex-toggle:hover{background:var(--bg-3)}
.reflex-toggle .arr{transition:transform .25s}
.reflex-toggle.open .arr{transform:rotate(180deg)}
.reflex-answer{
  max-height:0;overflow:hidden;transition:max-height .4s ease,margin .3s,padding .3s;
}
.reflex-answer.open{max-height:600px;margin-top:16px}
.reflex-answer .inner{
  background:var(--bg-1);border-left:3px solid var(--verde);
  border-radius:0 10px 10px 0;padding:16px 20px;
}
.reflex-answer .inner p{font-size:14px;color:var(--texto-2);margin:0}
.reflex-answer .inner strong{color:var(--verde)}

/* ===== FILE TREE ===== */
.tree{background:var(--bg-2);border:1px solid var(--borde);border-radius:12px;padding:18px 22px;margin:18px 0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.9}
.tree .t-folder{color:var(--acento-claro)}
.tree .t-file{color:var(--texto)}
.tree .t-note{color:var(--texto-3)}

/* ===== LIST ===== */
.ilist{list-style:none;margin:14px 0}
.ilist li{display:flex;gap:12px;align-items:flex-start;margin-bottom:11px;color:var(--texto-2);font-size:14.5px}
.ilist li .li-ic{color:var(--acento-claro);flex-shrink:0;font-size:15px;margin-top:2px}

/* ===== AVISO COPYRIGHT ===== */
.aviso{
  background:var(--bg-1);border:1px solid var(--borde);
  border-left:4px solid var(--dev-vibrante);border-radius:0 12px 12px 0;
  padding:18px 22px;margin-bottom:28px;
}
.aviso .a-title{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:1.5px;color:var(--acento-claro);
  display:flex;align-items:center;gap:9px;margin-bottom:9px;
}
.aviso p{font-size:12.5px;color:var(--texto-3);margin:0;line-height:1.6}
.aviso strong{color:var(--texto-2)}

/* ===== FOOTER ===== */
.footer{
  border-top:1px solid var(--borde);margin-top:50px;padding-top:24px;
  font-size:12px;color:var(--texto-3);text-align:center;line-height:1.8;
}
.footer a{color:var(--acento-claro);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ===== NAV BOTONES INFERIOR ===== */
.sec-nav{display:flex;justify-content:space-between;gap:14px;margin-top:36px}
.sec-nav button{
  background:var(--bg-1);border:1px solid var(--borde-fuerte);color:var(--texto);
  font-family:inherit;font-size:13.5px;font-weight:600;padding:12px 20px;
  border-radius:11px;cursor:pointer;transition:all .18s;flex:1;
  display:flex;align-items:center;gap:9px;justify-content:center;
}
.sec-nav button:hover:not(:disabled){background:var(--bg-3);border-color:var(--dev-vibrante)}
.sec-nav button:disabled{opacity:.3;cursor:not-allowed}
.sec-nav button.next{background:linear-gradient(135deg,var(--dev-vibrante),var(--dev-principal));border-color:transparent}

/* ===== WATERMARK ===== */
.watermark{
  position:fixed;bottom:14px;right:16px;z-index:30;
  font-size:11px;color:var(--texto-3);opacity:.4;
  font-family:'JetBrains Mono',monospace;pointer-events:none;
}

/* ===== PRESENT MODE ===== */
body.present .sidebar,body.present .topbar,body.present .sec-nav,body.present .watermark{display:none}
body.present .main{margin-left:0}
body.present .content{max-width:1100px;margin:0 auto;padding:60px 60px 80px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
body.present .hero h1{font-size:46px}
body.present .section{font-size:1.06em}
.present-hud{
  display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:60;background:var(--bg-2);border:1px solid var(--borde-fuerte);
  border-radius:99px;padding:9px 18px;align-items:center;gap:16px;
  font-size:12.5px;color:var(--texto-2);box-shadow:0 8px 30px rgba(0,0,0,.5);
}
body.present .present-hud{display:flex}
.present-hud kbd{background:var(--bg-3);border:1px solid var(--borde-fuerte);border-radius:6px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:11px}
.present-hud .pcount{color:var(--acento-claro);font-weight:700}

/* ===== RESPONSIVE ===== */
@media(max-width:920px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .content{padding:28px 20px 80px}
  .topbar{padding:12px 20px}
  .hero{padding:30px 24px}
  .hero h1{font-size:28px}
  .def{grid-template-columns:1fr}
  .tern-grid{grid-template-columns:1fr !important}
  .watermark{display:none}
  .progress-wrap{max-width:none}
  .btn-present{display:none}
}
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">d</div>
      <div class="brand-txt">
        <strong>Dev Senior</strong>
        <span>AI Backend Developer</span>
      </div>
    </div>
    <div class="sidebar-eyebrow">Módulo 1 · Clase 4</div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Sección 1 de 10</div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <button class="btn-present" id="btnPresent">▶ Modo presentación</button>
    </div>

    <div class="content" id="content"><!-- secciones inyectadas --></div>
  </div>
</div>

<div class="watermark">© 2026 Ana Alvarado</div>
<div class="present-hud">
  <span><span class="pcount" id="hudCount">1 / 10</span></span>
  <span><kbd>←</kbd> <kbd>→</kbd> navegar</span>
  <span><kbd>Esc</kbd> salir</span>
</div>

<script>
/* ============================================================
   © 2026 Ana Alvarado — Material de autoría exclusiva.
   ============================================================ */

const SECCIONES = [
  {
    id:"intro", icon:"🎯", num:"Bienvenida", titulo:"Tu primera app real",
    html:`
      <div class="hero">
        <span class="hero-eyebrow">⚡ Proyecto integrador</span>
        <h1>Construye un <span class="accent">Gestor de Tareas</span> por consola</h1>
        <p>Hoy juntas todo lo que aprendiste en el módulo —variables, condicionales, funciones— y lo conviertes en una aplicación de línea de comandos que funciona de verdad. En el camino aparecen tres piezas nuevas, cada una porque el proyecto te la pide.</p>
        <div class="hero-meta">
          <span class="chip">📥 <b>Entrada por teclado</b></span>
          <span class="chip">🔁 <b>Ciclo while</b></span>
          <span class="chip">🔀 <b>switch</b></span>
          <span class="chip">🧩 <b>Modularización</b></span>
        </div>
      </div>

      <div class="aviso">
        <div class="a-title">© AVISO DE DERECHOS DE AUTOR</div>
        <p>Este material es de autoría exclusiva de <strong>Ana Alvarado</strong> y su acceso está limitado a las y los estudiantes de esta cohorte. Queda <strong>prohibida su reproducción, redistribución o uso fuera de clase</strong> sin autorización escrita de la autora.</p>
      </div>

      <div class="card">
        <h3><span class="dot"></span>El problema que vamos a resolver</h3>
        <p>Un equipo pequeño lleva sus pendientes en un chat de WhatsApp. Cada quien escribe "ya hice tal cosa", otro pregunta "¿qué falta?", y al final del día nadie sabe con certeza qué está pendiente ni qué es urgente.</p>
      </div>

      <div class="reflex">
        <div class="reflex-q">
          <div class="q-ic">💭</div>
          <div class="q-txt">¿Qué necesitaría un programa para reemplazar ese caos del chat?</div>
        </div>
        <button class="reflex-toggle" onclick="toggleReflex(this)">Ver explicación <span class="arr">▾</span></button>
        <div class="reflex-answer"><div class="inner">
          <p>El programa necesita <strong>guardar</strong> tareas (una lista en memoria), <strong>mostrarlas</strong> cuando se pidan, permitir <strong>marcarlas como hechas</strong>, <strong>eliminarlas</strong>, y sobre todo <strong>seguir funcionando</strong> después de cada acción para no reiniciarlo cada vez. Esas cinco necesidades son justo lo que construyes hoy: cada una te va a pedir una herramienta nueva.</p>
        </div></div>
      </div>

      <div class="banner tip">
        <span class="b-ic">🔗</span>
        <p>Ya sabes declarar variables (<code>let</code>, <code>const</code>), usar tipos, operadores, condicionales y crear <strong>funciones con parámetros y retorno</strong>. En la Clase 3 modelaste una tarea con tres propiedades: <code>titulo</code>, <code>prioridad</code> y <code>completada</code>. Hoy esa tarea deja de ser un ejemplo suelto y se vuelve el corazón de un sistema real.</p>
      </div>
    `

`function agregarTarea(lista, titulo, prioridad) {
  lista.push({ titulo: titulo, prioridad: prioridad, completada: false });
}

function completarTarea(lista, indice) {
  if (indice < 0 || indice >= lista.length) return false;
  lista[indice].completada = true;
  return true;
}

function eliminarTarea(lista, indice) {
  if (indice < 0 || indice >= lista.length) return false;
  lista.splice(indice, 1);
  return true;
}

module.exports = { agregarTarea, completarTarea, eliminarTarea };`)}

/* ===== helper de bloque de código con highlight ===== */
function code(file, lang, raw){
  const esc = raw
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const hl = highlight(esc, lang);
  const id = "c"+Math.random().toString(36).slice(2,8);
  return `
    <div class="code-wrap">
      <div class="code-head">
        <span class="code-file"><span class="fdot"></span>${file}</span>
        <span class="code-lang">${lang}</span>
        <button class="btn-copy" data-code="${id}" onclick="copyCode(this)">⧉ Copiar</button>
      </div>
      <pre><code id="${id}">${hl}</code></pre>
    </div>`;
}

/* resaltador ligero para JS / bash / text */
function highlight(s, lang){
  if(lang==="text") return s;
  // comentarios //
  s = s.replace(/(\/\/[^\n]*)/g,'<span class="tok-com">$1</span>');
  // strings
  s = s.replace(/(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;|"[^"]*"|'[^']*')/g,'<span class="tok-str">$1</span>');
  // keywords
  s = s.replace(/\b(const|let|var|function|return|if|else|while|switch|case|default|break|true|false|require|module|exports)\b/g,'<span class="tok-key">$1</span>');
  // funciones conocidas
  s = s.replace(/\b(console|prompt|push|splice|trim|Number|log)\b/g,'<span class="tok-fn">$1</span>');
  // números
  s = s.replace(/\b(\d+)\b/g,'<span class="tok-num">$1</span>');
  return s;
}

/* ===== render inicial ===== */
const content = document.getElementById('content');
const nav = document.getElementById('nav');
SECCIONES.forEach((sec,i)=>{
  const el = document.createElement('section');
  el.className = 'section'+(i===0?' visible':'');
  el.id = 'sec-'+sec.id;
  const head = i===0 ? '' :
    `<div class="sec-head">
       <div class="sec-icon">${sec.icon}</div>
       <div><div class="sec-num">${sec.num}</div><h2>${sec.titulo}</h2></div>
     </div>`;
  el.innerHTML = head + sec.html + navButtons(i);
  content.appendChild(el);

  const a = document.createElement('a');
  a.dataset.idx = i;
  a.innerHTML = `<span class="ic">${sec.icon}</span> ${sec.titulo}`;
  a.onclick = ()=>goTo(i);
  if(i===0) a.classList.add('active');
  nav.appendChild(a);
});

function navButtons(i){
  const prev = i>0 ? `<button onclick="goTo(${i-1})">← Anterior</button>` : `<button disabled>← Anterior</button>`;
  const next = i<SECCIONES.length-1 ? `<button class="next" onclick="goTo(${i+1})">Siguiente →</button>` : `<button class="next" disabled>Fin ✓</button>`;
  return `<div class="sec-nav">${prev}${next}</div>`;
}

let actual = 0;
const vistas = new Set([0]);

function goTo(i){
  if(i<0||i>=SECCIONES.length) return;
  document.querySelectorAll('.section')[actual].classList.remove('visible');
  document.querySelectorAll('.nav a')[actual].classList.remove('active');
  actual = i;
  const sec = document.querySelectorAll('.section')[i];
  sec.classList.add('visible');
  document.querySelectorAll('.nav a')[i].classList.add('active');
  vistas.add(i);
  updateProgress();
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top:0,behavior:'smooth'});
  if(!document.body.classList.contains('present')) content.scrollTop=0;
}

function updateProgress(){
  const pct = Math.round((vistas.size/SECCIONES.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `Sección ${actual+1} de ${SECCIONES.length}`;
  document.getElementById('hudCount').textContent = `${actual+1} / ${SECCIONES.length}`;
  document.querySelectorAll('.nav a').forEach((a,idx)=>{
    a.classList.toggle('done', vistas.has(idx) && idx!==actual);
  });
}
updateProgress();

function toggleReflex(btn){
  btn.classList.toggle('open');
  const ans = btn.nextElementSibling;
  ans.classList.toggle('open');
  btn.querySelector('.arr').textContent = ans.classList.contains('open') ? '▴' : '▾';
}

/* ===== copiar código ===== */
function copyCode(btn){
  const el = document.getElementById(btn.dataset.code);
  const txt = el.textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    btn.classList.add('ok');
    btn.textContent = '✓ Copiado';
    setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML='⧉ Copiar';},1600);
  });
}

/* ===== modo presentación ===== */
const btnPresent = document.getElementById('btnPresent');
btnPresent.onclick = ()=>{
  document.body.classList.add('present');
  if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
};
function exitPresent(){
  document.body.classList.remove('present');
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}

document.addEventListener('keydown',(e)=>{
  const present = document.body.classList.contains('present');
  if(e.key==='ArrowRight'||(present&&e.key===' ')){ e.preventDefault(); goTo(actual+1); }
  else if(e.key==='ArrowLeft'){ goTo(actual-1); }
  else if(e.key==='Escape'&&present){ exitPresent(); }
  else if(e.key==='p'||e.key==='P'){
    if(!present){ btnPresent.click(); }
  }
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement) document.body.classList.remove('present');
});
